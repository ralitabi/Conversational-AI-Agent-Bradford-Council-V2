version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: bradford-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  api:
    build:
      context: .
      dockerfile: Backend/Api/Dockerfile
    container_name: bradford-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - Qdrant__Host=qdrant
      - ConnectionStrings__Default=Data Source=/data/agent.db
    volumes:
      - db_data:/data
    depends_on:
      - qdrant

volumes:
  qdrant_data:
  db_data:
